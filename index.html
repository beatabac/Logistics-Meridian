  /* ── HEADER ── */

  #logo { display: flex; align-items: center; gap: 10px; }
  #logo-circle {

  #logo-text .sub { font-size: 8px; color: var(--blue-dim); letter-spacing: 2px; font-family: monospace; }
  #header-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  .countdown-box .value { font-family: monospace; font-size: 12px; font-weight: 700; color: #d84030; white-space: nowrap; animation: pulse 1.2s infinite; }

  /* ── GMT BOX ── */

    background: rgba(12,25,40,.9); border: 1px solid rgba(58,120,184,.15);
    border-radius: 4px; padding: 5px 10px; text-align: center;
  }
  .gmt-box .label { font-size: 8px; color: var(--blue-dim); font-family: monospace; }
  .gmt-box .value { font-family: monospace; font-size: 12px; color: #4870a0; }

  /* ── HEADER BUTTON ── */
  .hdr-btn {
    padding: 6px 11px; background: transparent; border-radius: 3px;
    font-family: monospace; font-size: 9px; font-weight: 700; letter-spacing: 1px;
    border: 1px solid rgba(26,48,80,.6); color: var(--blue-dim);

  }
  .hdr-btn.active { color: var(--gold); border-color: rgba(180,160,40,.4); }

  /* ── TICKER ── */
  #ticker {
    overflow: hidden; background: rgba(160,30,20,.2);
    border-bottom: 1px solid rgba(180,50,35,.4);
    padding: 5px 0; display: flex; align-items: center; flex-shrink: 0;
  }
  #ticker-label {
    background: #a81810; color: #fff; padding: 3px 12px;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    font-family: monospace; flex-shrink: 0;

  #ticker-inner { white-space: nowrap; font-size: 10px; color: #b86858; font-family: monospace; padding: 0 20px; letter-spacing: .3px; will-change: transform; }

  #statusbar {
    background: rgba(4,12,22,.85); border-bottom: 1px solid rgba(255,255,255,.035);

  .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pulse { animation: pulse 1s infinite; }
  .status-label { font-family: monospace; font-size: 9px; color: var(--blue-dim); }
  .status-val { font-family: monospace; font-size: 9px; }

  /* ── TABS ── */

  .card-name { color: #c0d0e0; font-size: 12px; font-weight: 600; font-family: monospace; letter-spacing: .5px; }

// ══ THREAT COLOURS ══
const THREAT = {
  CRITICAL: { bg: "#8a1810", glow: "#c02018", bar: "#c02018" },
  HIGH:     { bg: "#7a3010", glow: "#b04818", bar: "#b04818" },
  ELEVATED: { bg: "#6a5008", glow: "#a07810", bar: "#a07810" },
  MODERATE: { bg: "#0a3858", glow: "#1860a0", bar: "#1860a0" },
};

function badge(level) {
  const s = THREAT[level] || THREAT.MODERATE;
  return `<span class="badge" style="background:${s.bg};box-shadow:0 0 8px ${s.glow}55">
    <span class="badge-dot" style="background:${s.glow}"></span>${level}
  </span>`;
}
function bullet(text, color) {
  return `<div class="bullet"><span class="bullet-diamond" style="color:${color||'var(--blue)'}">◆</span><span class="bullet-text">${text}</span></div>`;
}
function card(icon, title, threat, accentColor, inner) {
  const col = accentColor || (threat === "CRITICAL" ? "#c02018" : threat === "HIGH" ? "#b04818" : "#3a78b8");
  return `<div class="card" style="border-left:3px solid ${col};box-shadow:-2px 0 16px ${col}18">
    <div class="card-head">
      <div class="card-title"><span class="card-icon">${icon}</span><span class="card-name">${title}</span></div>
      ${threat ? badge(threat) : ""}
    </div>
    ${inner}
  </div>`;
}
function sectionHead(title, sub) {
  return `<div class="section-head"><div class="title">${title}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
}

// ══ TAB RENDERING ══
function renderBriefing() {
  let h = sectionHead("MERIDIAN DAILY LOGISTICS BRIEFING", `${INTEL.updated} | DEFCON: ${INTEL.defcon}`);

  // Situation
  h += card("🌐", "SITUATION OVERVIEW", null, "#3a78b8",
    INTEL.situation.map(s => `<p class="situation-p">${s}</p>`).join(""));

  // Flash alerts
  h += `<div id="flash-card">
    <div class="flash-head"><span>⚡</span><span class="flash-title">FLASH ALERTS — TIME-CRITICAL</span></div>
    ${INTEL.flash.map((f,i) => `<div class="flash-item"><span class="flash-num">!${i+1}</span><span class="flash-text">${f}</span></div>`).join("")}
  </div>`;

  // Sectors
  h += card("🚛", "ROAD TRANSPORT", INTEL.road.threat, null, INTEL.road.bullets.map(b => bullet(b)).join(""));
  h += card("🏭", "WAREHOUSING", INTEL.warehousing.threat, null, INTEL.warehousing.bullets.map(b => bullet(b)).join(""));
  h += card("🚢", "OCEAN FREIGHT", INTEL.ocean.threat, "#c02018", INTEL.ocean.bullets.map(b => bullet(b, "#c02018")).join(""));

  // Pulse
  h += card("📊", "MARKET PULSE", null, "#3a78b8",
    INTEL.pulse.map(p => {
      const col = p.trend === "up" ? "#c03020" : "#208050";
      const arrow = p.trend === "up" ? "↑" : "↓";
      return `<div class="pulse-row">
        <span class="pulse-label">${p.label}</span>
        <div class="pulse-right">
          <div class="pulse-value">${p.value} <span class="pulse-arrow" style="color:${col}">${arrow}</span></div>
          <div class="pulse-note">${p.note}</div>
        </div>
      </div>`;
    }).join(""));

  // Outlook
  h += card("🔭", "72-HOUR OUTLOOK — DEAL VS NO-DEAL + STRUCTURAL SHIFT", null, "#3a78b8",
    INTEL.outlook.map(o => `<p class="situation-p">${o}</p>`).join(""));

  // Footer
  h += `<div id="footer">
    <div class="line1">MERIDIAN v7.1 · ${INTEL.updated} · FULL ATTRIBUTION IN SOURCES TAB</div>
    <div>MAERSK · MSC · CMA CGM · HAPAG-LLOYD · EVERGREEN · DHL · KN · DSV · LLOYD'S LIST · LOADSTAR · GOLDMAN · JPMORGAN · BERNSTEIN · BCG · PwC · UNCTAD</div>
  </div>`;

  return h;
}

function renderPorts() {
  let h = sectionHead("PORT &amp; GATEWAY STATUS — CARRIER CONFIRMED", INTEL.updated);

  // Port grid
  const grid = INTEL.portStatus.map(p => `<div class="port-item">
    <div class="port-head">
      <span class="port-dot ${(p.status==="SATURATED"||p.status==="CONGESTED"||p.status==="NO EXPORTS"||p.status==="MSC SUSPENDED")?"pulse":""}" style="background:${p.col}"></span>
      <span class="port-name">${p.name}</span>
      <span class="port-status" style="color:${p.col}">${p.status}</span>
    </div>
    <div class="port-note">${p.note}</div>
  </div>`).join("");

  h += card("🗺", "PORT STATUS MATRIX", null, "#3a78b8", `<div id="port-grid">${grid}</div>`);

  h += card("📋", "CARRIER ACTIONS — OFFICIAL ADVISORIES", null, "#3a78b8", [
    "Maersk: Op.Update 8 (Mar 11) + Apr 22 update. EBS 2026 weekly FSC. Essential cargo only. FM1/ME11 suspended. Empty returns to designated depots only.",
    "MSC: EoV declared (Mar 3), $800/container diversion, 19th-century maritime law. Export bookings SUSPENDED at Sohar and Salalah.",
    "CMA CGM: Customer Advisory #10 — fuel pressure hit sea AND inland all modes. Clause 10 activated. Broad booking halt. ECS $2,000/20ft, $3,000/40ft, $4,000 reefer.",
    "Hapag-Lloyd: No Gulf bookings except Jeddah. WRS $1,500/TEU. Nils Haupt: 'Not a lot we can do — waiting for maritime certainty.'",
    "Evergreen: Fuel costs +60% since Feb 28. Broad Upper Gulf suspension.",
    "ONE CEO Jeremy Nixon: Up to 100 vessels in region. Feeder ship availability tightening globally.",
    "DHL (all advisories): Hormuz 'effectively closed — no commercial container shipping at this time.' Crisis Calls activated daily.",
  ].map(b => bullet(b)).join(""));

  return h;
}

function renderCorridors() {
  let h = sectionHead("ALTERNATIVE CORRIDOR WATCH", INTEL.updated);
  h += INTEL.corridors.map(c => card(c.icon, c.title, null, c.col,
    `<div class="corridor-status">
      <span class="corridor-dot" style="background:${c.col}"></span>
      <span class="corridor-label" style="color:${c.col}">${c.status}</span>
    </div>` +
    c.items.map(d => bullet(d, c.col)).join("")
  )).join("");
  return h;
}

function renderSources() {
  let h = sectionHead("INTELLIGENCE SOURCES — FULL ATTRIBUTION", INTEL.updated);
  const icons = ["🚨","🚢","🏢","🏦"];
  const cols = ["#c02018","#3a78b8","#3a78b8","#3a78b8"];
  h += INTEL.sources.map((s,i) =>
    card(icons[i]||"📋", s.cat, null, cols[i]||"#3a78b8",
      s.items.map(b => bullet(b)).join(""))
  ).join("");
  h += `<div class="source-note">
    <div class="source-note-title">FT PAYWALL NOTE</div>
    <div class="source-note-text">ft.com and ft.trib.al are paywalled. FT content is captured via syndication (This Day Live, Threads @financialtimes, NDTA, Automotive Logistics, PBS/AP). Paste key FT paragraphs directly into the chat to include them verbatim in the next refresh.</div>
  </div>`;
  return h;
}

// ══ TAB SWITCHING ══
let currentTab = "briefing";
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderContent();
}
function renderContent() {
  const el = document.getElementById("content");
  el.style.animation = "none"; el.offsetHeight; el.style.animation = "";
  if (currentTab === "briefing") el.innerHTML = renderBriefing();
  else if (currentTab === "ports") el.innerHTML = renderPorts();
  else if (currentTab === "corridors") el.innerHTML = renderCorridors();
  else el.innerHTML = renderSources();
}

// ══ STATUS BAR ══
function buildStatusBar() {
  const bar = document.getElementById("statusbar");
  bar.innerHTML = INTEL.statusItems.map(s => `
    <div class="status-item">
      <span class="status-dot ${s.pulse?"pulse":""}" style="background:${s.c}"></span>
      <span class="status-label">${s.l}</span>
      <span class="status-val" style="color:${s.c}">${s.s}</span>
    </div>`).join("");
}

// ══ TICKER ══
let tickerPos = 0;
let tickerTotal = 0;
function initTicker() {
  const full = INTEL.tickers.join("     ◆     ");
  const inner = document.getElementById("ticker-inner");
  inner.textContent = full + "     ◆     " + full;
  tickerTotal = full.length * 7.7;
  function animate() {
    tickerPos = (tickerPos + 0.42) % tickerTotal;
    inner.style.transform = `translateX(-${tickerPos}px)`;
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// ══ CLOCKS ══
function updateClocks() {
  const now = new Date();
  document.getElementById("gmt-clock").textContent = now.toUTCString().slice(17, 25);

  const diff = new Date(INTEL.ceasefireExpiry) - now;
  if (diff <= 0) { document.getElementById("countdown").textContent = "ACTIVE"; return; }
  const d = Math.floor(diff/86400000), hh = Math.floor((diff%86400000)/3600000);
  const mm = Math.floor((diff%3600000)/60000), ss = Math.floor((diff%60000)/1000);
  document.getElementById("countdown").textContent =
    `${d}D ${String(hh).padStart(2,"0")}H ${String(mm).padStart(2,"0")}M ${String(ss).padStart(2,"0")}S`;
}

// ══ INIT ══
buildStatusBar();
initTicker();
renderContent();
setInterval(updateClocks, 1000);
updateClocks();
</script>
