// ── RENDERING ──
const T={CRITICAL:{bg:"#8a1810",glow:"#c02018"},HIGH:{bg:"#7a3010",glow:"#b04818"},ELEVATED:{bg:"#6a5008",glow:"#a07810"},MODERATE:{bg:"#0a3858",glow:"#1860a0"}};
function bdg(l){const s=T[l]||T.MODERATE;return`<span class="badge" style="background:${s.bg};box-shadow:0 0 8px ${s.glow}55"><span class="bd" style="background:${s.glow}"></span>${l}</span>`;}
function bl(t,c){return`<div class="bul"><span class="bdia" style="color:${c||'var(--blue)'}">◆</span><span class="btxt">${t}</span></div>`;}
function card(ic,ti,th,ac,in_){const c=ac||(th==="CRITICAL"?"#c02018":th==="HIGH"?"#b04818":"#3a78b8");return`<div class="card" style="border-left:3px solid ${c};box-shadow:-2px 0 16px ${c}18"><div class="ch"><div class="ct"><span>${ic}</span><span class="cn">${ti}</span></div>${th?bdg(th):""}</div>${in_}</div>`;}
function shd(t,s){return`<div class="sh"><div class="t">${t}</div>${s?`<div class="s">${s}</div>`:""}</div>`;}

function rB(){
  let h=shd("MERIDIAN DAILY LOGISTICS BRIEFING",`${D.updated} | DEFCON: ${D.defcon}`);
  h+=card("🌐","SITUATION OVERVIEW — WEEK 9",null,"#3a78b8",D.sit.map(s=>`<p class="sp">${s}</p>`).join(""));
  h+=`<div id="fc"><div class="fh"><span>⚡</span><span class="ft">FLASH ALERTS — TIME-CRITICAL</span></div>${D.flash.map((f,i)=>`<div class="fi"><span class="fn">!${i+1}</span><span class="fx">${f}</span></div>`).join("")}</div>`;
  h+=card("🚛","ROAD TRANSPORT",D.road.threat,null,D.road.bullets.map(b=>bl(b)).join(""));
  h+=card("🏭","WAREHOUSING",D.ware.threat,null,D.ware.bullets.map(b=>bl(b)).join(""));
  h+=card("🚢","OCEAN FREIGHT",D.ocean.threat,"#c02018",D.ocean.bullets.map(b=>bl(b,"#c02018")).join(""));
  h+=card("📊","MARKET PULSE — VERIFIED RATES",null,"#3a78b8",D.pulse.map(p=>{const c=p.t==="up"?"#c03020":"#208050",a=p.t==="up"?"↑":"↓";return`<div class="pr"><span class="pl">${p.l}</span><div class="prt"><div class="pv">${p.v} <span class="pa" style="color:${c}">${a}</span></div><div class="pn">${p.n}</div></div></div>`;}).join(""));
  h+=card("🔭","72-HOUR OUTLOOK",null,"#3a78b8",D.outlook.map(o=>`<p class="sp">${o}</p>`).join(""));
  h+=`<div id="ftr"><div class="f1">MERIDIAN v7.4 · ${D.updated} · FULL ATTRIBUTION IN SOURCES TAB</div><div>MAERSK · DHL · DSV · APL LOGISTICS · FREIGHTOS · DREWRY · IMF · GOLDMAN · JPMORGAN · CNBC · NYT · CBS · AL JAZEERA · NPR · S&P GLOBAL · TRADING ECONOMICS · GARTNER · XENETA · KPMG · BCG · PwC · UNCTAD · PSA BDP · UN NEWS</div></div>`;
  return h;
}
function rP(){
  let h=shd("PORT & GATEWAY STATUS — CARRIER CONFIRMED",D.updated);
  h+=card("🗺","PORT STATUS MATRIX",null,"#3a78b8",`<div id="pg">${D.ports.map(p=>`<div class="pi"><div class="ph"><span class="pdot${(p.s.includes("EXPIRE")||p.s==="CONGESTED"||p.s==="NO EXPORTS"||p.s.includes("DAY"))?" p":""}" style="background:${p.c}"></span><span class="pnam">${p.n}</span><span class="pst" style="color:${p.c}">${p.s}</span></div><div class="pno">${p.no}</div></div>`).join("")}</div>`);

  ].map(b=>bl(b)).join(""));
  return h;
}
function rC(){
  let h=shd("ALTERNATIVE CORRIDOR WATCH",D.updated);
  h+=D.corridors.map(c=>card(c.icon,c.title,null,c.col,`<div class="cs"><span class="cdot" style="background:${c.col}"></span><span class="clbl" style="color:${c.col}">${c.status}</span></div>`+c.items.map(d=>bl(d,c.col)).join(""))).join("");
  return h;
}
function rS(){
  let h=shd("INTELLIGENCE SOURCES — FULL ATTRIBUTION v7.4",D.updated);
  const ic=["🚨","📊","🚢","🏦"];const co=["#c02018","#3a78b8","#3a78b8","#3a78b8"];
  h+=D.sources.map((s,i)=>card(ic[i]||"📋",s.cat,null,co[i]||"#3a78b8",s.items.map(b=>bl(b)).join(""))).join("");
  h+=`<div class="sn"><div class="snt">COVERAGE NOTES</div><div class="snb">FT (ft.com): paywalled — content captured via CBS/NYT/Wikipedia syndication. Clarksons: subscription only — data via Lloyd's List secondary sourcing. Gartner proprietary reports: subscription only — quotes captured via ISM/Supply Chain Dive. PSA BDP: full advisories via blog trendwatch items. Next Gartner event: Supply Chain Symposium May 18-20, Barcelona.</div></div>`;
  return h;
}

let cur="b";
function go(t,b){cur=t;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("a"));b.classList.add("a");render();}
function render(){const e=document.getElementById("cnt");e.style.animation="none";e.offsetHeight;e.style.animation="";if(cur==="b")e.innerHTML=rB();else if(cur==="p")e.innerHTML=rP();else if(cur==="c")e.innerHTML=rC();else e.innerHTML=rS();}

// STATUS BAR
(function(){document.getElementById("sb").innerHTML=D.status.map(s=>`<div class="si"><span class="sd${s.p?" p":""}" style="background:${s.c}"></span><span class="sl">${s.l}</span><span class="sv" style="color:${s.c}">${s.s}</span></div>`).join("");})();

// TICKER
(function(){const full=D.tickers.join("     ◆     ");const el=document.getElementById("ti");el.textContent=full+"     ◆     "+full;const tot=full.length*7.7;let pos=0;(function go(){pos=(pos+0.42)%tot;el.style.transform=`translateX(-${pos}px)`;requestAnimationFrame(go);})();})();

// CLOCKS
function clk(){
  const n=new Date();
  document.getElementById("gmt").textContent=n.toUTCString().slice(17,25);
  const df=new Date(D.exp)-n;
  if(df<=0){document.getElementById("countdown").textContent="ACTIVE";return;}
  const d=Math.floor(df/86400000),h=Math.floor((df%86400000)/3600000),m=Math.floor((df%3600000)/60000),s=Math.floor((df%60000)/1000);
  document.getElementById("countdown").textContent=`${d}D ${String(h).padStart(2,"0")}H ${String(m).padStart(2,"0")}M ${String(s).padStart(2,"0")}S`;
}
setInterval(clk,1000);clk();render();
